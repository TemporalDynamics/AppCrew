version: "3.9"

services:
  platform:
    build: .
    container_name: sourcing-platform
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - platform_data:/app/data
    env_file:
      - .env
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  platform_data:
